name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Build
        run: |
          cd swift
          swift build -c release

      - name: Package app
        run: |
          APP_DIR="HealthTick.app/Contents/MacOS"
          mkdir -p "$APP_DIR"
          cp swift/.build/release/HealthTick "$APP_DIR/"
          cp swift/Sources/Info.plist "HealthTick.app/Contents/"

          RES_DIR="HealthTick.app/Contents/Resources"
          mkdir -p "$RES_DIR"
          if [ -d "swift/Sources/Resources" ]; then
            cp -R swift/Sources/Resources/* "$RES_DIR/"
          fi

      - name: Create DMG
        run: |
          mkdir -p dmg_content
          cp -R HealthTick.app dmg_content/
          ln -s /Applications dmg_content/Applications
          hdiutil create -volname "HealthTick" -srcfolder dmg_content -ov -format UDZO "HealthTick-${VERSION}.dmg"

      - name: Create ZIP
        run: |
          zip -r "HealthTick-${VERSION}.zip" HealthTick.app

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: "HealthTick ${{ env.VERSION }}"
          body: |
            ## HealthTick ${{ env.VERSION }}

            ### 安装方式
            1. 下载 `.dmg` 文件，打开后将 HealthTick 拖入 Applications 文件夹
            2. 或下载 `.zip` 文件，解压后将 HealthTick.app 移动到应用程序文件夹

            ### 更新方式
            - 应用内会自动检测新版本
            - 也可在 设置 > 关于 中手动检查更新
          files: |
            HealthTick-${{ env.VERSION }}.dmg
            HealthTick-${{ env.VERSION }}.zip

      - name: Upload artifacts (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: HealthTick-${{ env.VERSION }}
          path: |
            HealthTick-${{ env.VERSION }}.dmg
            HealthTick-${{ env.VERSION }}.zip
